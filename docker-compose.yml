services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sigint
      POSTGRES_USER: sigint
      POSTGRES_PASSWORD: sigint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
